name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmake_generator: "MinGW Makefiles"
          - os: ubuntu-latest
            cmake_generator: "Unix Makefiles"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mingw --yes --no-progress
          $searchRoot = 'C:\ProgramData\chocolatey\lib\mingw\tools\install'
          $gcc = Get-ChildItem -Path $searchRoot -Recurse -Filter gcc.exe -ErrorAction Stop |
            Select-Object -First 1
          if (-not $gcc) {
            throw 'Failed to locate gcc.exe after installing MinGW.'
          }
          $binDir = Split-Path -Parent $gcc.FullName
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        run: cmake -S . -B build -G "${{ matrix.cmake_generator }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package
        working-directory: build
        run: cpack --config CPackConfig.cmake -C Release

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-package
          path: build/FastRing-*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
