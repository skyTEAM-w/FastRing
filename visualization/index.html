<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADC数据采集系统 - 代码结构可视化</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 320px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.2em;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }
        
        .legend {
            margin-bottom: 30px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .legend-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 12px;
        }
        
        .legend-text {
            font-size: 0.9em;
        }
        
        .stats {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .stats h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1em;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.85em;
        }
        
        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            color: #00d4ff;
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #888;
            font-size: 0.9em;
        }
        
        .controls {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85em;
        }
        
        .control-btn:hover {
            background: rgba(0, 212, 255, 0.4);
        }
        
        .control-btn.active {
            background: #00d4ff;
            color: #1a1a2e;
        }
        
        .visualization-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        #graph-container {
            width: 100%;
            height: 100%;
        }
        
        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .node:hover {
            filter: brightness(1.3);
        }
        
        .node rect {
            rx: 8;
            ry: 8;
            stroke-width: 2;
        }
        
        .node text {
            font-size: 12px;
            fill: #fff;
            pointer-events: none;
        }
        
        .link {
            fill: none;
            stroke-opacity: 0.6;
        }
        
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 0.85em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            max-width: 300px;
            z-index: 100;
        }
        
        .tooltip.visible {
            opacity: 1;
        }
        
        .tooltip h4 {
            color: #00d4ff;
            margin-bottom: 8px;
        }
        
        .tooltip p {
            margin: 4px 0;
            color: #ccc;
        }
        
        .dependency-list {
            margin-top: 10px;
        }
        
        .dependency-item {
            display: inline-block;
            background: rgba(0, 212, 255, 0.2);
            padding: 2px 8px;
            border-radius: 3px;
            margin: 2px;
            font-size: 0.8em;
        }
        
        .search-box {
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            font-size: 0.9em;
        }
        
        .search-box input::placeholder {
            color: #888;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .file-info {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .file-info h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 1em;
        }
        
        .file-info-content {
            font-size: 0.85em;
            color: #ccc;
        }
        
        .file-info-content p {
            margin: 5px 0;
        }
        
        .highlight {
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>模块图例</h2>
            <div class="legend" id="legend"></div>
            
            <div class="stats">
                <h3>项目统计</h3>
                <div class="stat-item">
                    <span>源文件</span>
                    <span class="stat-value">12</span>
                </div>
                <div class="stat-item">
                    <span>头文件</span>
                    <span class="stat-value">8</span>
                </div>
                <div class="stat-item">
                    <span>测试文件</span>
                    <span class="stat-value">4</span>
                </div>
                <div class="stat-item">
                    <span>模块数</span>
                    <span class="stat-value">6</span>
                </div>
                <div class="stat-item">
                    <span>代码行数</span>
                    <span class="stat-value">~3500</span>
                </div>
            </div>
            
            <div class="file-info" id="file-info" style="display: none;">
                <h3>文件详情</h3>
                <div class="file-info-content" id="file-info-content"></div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>高性能ADC数据采集与传输系统</h1>
                <p>交互式代码结构可视化 - 点击节点查看详情，拖拽移动视图</p>
            </div>
            
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索文件或模块...">
            </div>
            
            <div class="controls">
                <button class="control-btn active" data-view="dependency">依赖关系图</button>
                <button class="control-btn" data-view="hierarchy">层级结构图</button>
                <button class="control-btn" data-view="flow">数据流图</button>
                <button class="control-btn" id="reset-btn">重置视图</button>
                <button class="control-btn" id="zoom-in-btn">放大</button>
                <button class="control-btn" id="zoom-out-btn">缩小</button>
            </div>
            
            <div class="visualization-area">
                <div id="graph-container"></div>
                <div class="tooltip" id="tooltip"></div>
            </div>
        </div>
    </div>

    <script>
        const moduleColors = {
            'core': '#00d4ff',
            'adc': '#00ff88',
            'buffer': '#ff6b6b',
            'thread': '#ffd93d',
            'network': '#c56cf0',
            'utils': '#74b9ff',
            'test': '#95a5a6',
            'config': '#e17055'
        };
        
        const moduleDescriptions = {
            'core': '核心模块 - 类型定义与常量',
            'adc': 'ADC模块 - 数据采集模拟器',
            'buffer': '缓冲区模块 - 无锁环形缓冲区',
            'thread': '线程模块 - 多线程管理',
            'network': '网络模块 - TCP客户端',
            'utils': '工具模块 - 日志、时间戳、配置',
            'test': '测试模块 - 单元测试与性能测试',
            'config': '配置模块 - 系统配置管理'
        };
        
        const nodes = [
            { id: 'adc_types', name: 'adc_types.h', module: 'core', type: 'header', 
              desc: '核心类型定义', lines: 150,
              dependencies: [], exports: ['adc_sample_t', 'adc_error_t', 'data_block_t', 'system_stats_t'] },
            { id: 'config_h', name: 'config.h', module: 'config', type: 'header',
              desc: '配置管理头文件', lines: 145,
              dependencies: ['adc_types'], exports: ['system_config_t', 'config_get_default'] },
            { id: 'ring_buffer_h', name: 'ring_buffer.h', module: 'buffer', type: 'header',
              desc: '环形缓冲区头文件', lines: 120,
              dependencies: ['adc_types'], exports: ['ring_buffer_t', 'buffer_manager_t'] },
            { id: 'adc_simulator_h', name: 'adc_simulator.h', module: 'adc', type: 'header',
              desc: 'ADC模拟器头文件', lines: 100,
              dependencies: ['adc_types'], exports: ['adc_simulator_t', 'adc_config_t'] },
            { id: 'thread_manager_h', name: 'thread_manager.h', module: 'thread', type: 'header',
              desc: '线程管理器头文件', lines: 130,
              dependencies: ['adc_types', 'ring_buffer_h'], exports: ['thread_manager_t', 'thread_type_t'] },
            { id: 'tcp_client_h', name: 'tcp_client.h', module: 'network', type: 'header',
              desc: 'TCP客户端头文件', lines: 90,
              dependencies: ['adc_types'], exports: ['tcp_client_t', 'tcp_config_t'] },
            { id: 'timestamp_h', name: 'timestamp.h', module: 'utils', type: 'header',
              desc: '时间戳工具头文件', lines: 60,
              dependencies: [], exports: ['get_timestamp_us', 'high_res_sleep'] },
            { id: 'logger_h', name: 'logger.h', module: 'utils', type: 'header',
              desc: '日志系统头文件', lines: 80,
              dependencies: [], exports: ['log_init', 'LOG_INFO', 'LOG_ERROR'] },
            
            { id: 'adc_simulator_c', name: 'adc_simulator.c', module: 'adc', type: 'source',
              desc: 'ADC模拟器实现', lines: 350,
              dependencies: ['adc_simulator_h', 'timestamp_h', 'logger_h'], exports: [] },
            { id: 'ring_buffer_c', name: 'ring_buffer.c', module: 'buffer', type: 'source',
              desc: '环形缓冲区实现', lines: 280,
              dependencies: ['ring_buffer_h', 'logger_h'], exports: [] },
            { id: 'thread_manager_c', name: 'thread_manager.c', module: 'thread', type: 'source',
              desc: '线程管理器实现', lines: 320,
              dependencies: ['thread_manager_h', 'logger_h'], exports: [] },
            { id: 'thread_workers_c', name: 'thread_workers.c', module: 'thread', type: 'source',
              desc: '线程工作函数实现', lines: 250,
              dependencies: ['thread_manager_h', 'adc_simulator_h', 'tcp_client_h', 'ring_buffer_h'], exports: [] },
            { id: 'tcp_client_c', name: 'tcp_client.c', module: 'network', type: 'source',
              desc: 'TCP客户端实现', lines: 300,
              dependencies: ['tcp_client_h', 'logger_h', 'timestamp_h'], exports: [] },
            { id: 'timestamp_c', name: 'timestamp.c', module: 'utils', type: 'source',
              desc: '时间戳工具实现', lines: 180,
              dependencies: ['timestamp_h'], exports: [] },
            { id: 'logger_c', name: 'logger.c', module: 'utils', type: 'source',
              desc: '日志系统实现', lines: 150,
              dependencies: ['logger_h', 'timestamp_h'], exports: [] },
            { id: 'config_c', name: 'config.c', module: 'config', type: 'source',
              desc: '配置管理实现', lines: 150,
              dependencies: ['config_h', 'adc_types', 'logger_h'], exports: [] },
            { id: 'adc_error_c', name: 'adc_error.c', module: 'core', type: 'source',
              desc: '错误处理实现', lines: 30,
              dependencies: ['adc_types'], exports: [] },
            { id: 'main_c', name: 'main.c', module: 'core', type: 'source',
              desc: '主程序入口', lines: 200,
              dependencies: ['adc_types', 'adc_simulator_h', 'ring_buffer_h', 'thread_manager_h', 'tcp_client_h', 'logger_h'], exports: [] },
            
            { id: 'test_ring_buffer', name: 'test_ring_buffer.c', module: 'test', type: 'test',
              desc: '环形缓冲区测试', lines: 200,
              dependencies: ['ring_buffer_h', 'timestamp_h', 'logger_h'], exports: [] },
            { id: 'test_adc_simulator', name: 'test_adc_simulator.c', module: 'test', type: 'test',
              desc: 'ADC模拟器测试', lines: 250,
              dependencies: ['adc_simulator_h', 'timestamp_h', 'logger_h'], exports: [] },
            { id: 'test_performance', name: 'test_performance.c', module: 'test', type: 'test',
              desc: '性能测试', lines: 220,
              dependencies: ['ring_buffer_h', 'timestamp_h', 'logger_h'], exports: [] },
            { id: 'test_server', name: 'test_server.c', module: 'test', type: 'test',
              desc: '测试服务器', lines: 180,
              dependencies: ['tcp_client_h', 'timestamp_h', 'logger_h'], exports: [] }
        ];
        
        const links = [];
        nodes.forEach(node => {
            node.dependencies.forEach(dep => {
                links.push({
                    source: dep,
                    target: node.id,
                    type: 'depends'
                });
            });
        });
        
        let currentView = 'dependency';
        let svg, g, zoom, simulation;
        let nodeElements, linkElements;
        
        function initVisualization() {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            svg = d3.select('#graph-container')
                .append('svg')
                .attr('width', '100%')
                .attr('height', '100%')
                .attr('viewBox', `0 0 ${width} ${height}`);
            
            const defs = svg.append('defs');
            
            Object.entries(moduleColors).forEach(([name, color]) => {
                const gradient = defs.append('linearGradient')
                    .attr('id', `gradient-${name}`)
                    .attr('x1', '0%').attr('y1', '0%')
                    .attr('x2', '100%').attr('y2', '100%');
                gradient.append('stop').attr('offset', '0%').attr('stop-color', color).attr('stop-opacity', 0.8);
                gradient.append('stop').attr('offset', '100%').attr('stop-color', color).attr('stop-opacity', 0.4);
            });
            
            const arrowMarker = defs.append('marker')
                .attr('id', 'arrowhead')
                .attr('viewBox', '-0 -5 10 10')
                .attr('refX', 20)
                .attr('refY', 0)
                .attr('orient', 'auto')
                .attr('markerWidth', 6)
                .attr('markerHeight', 6);
            arrowMarker.append('path')
                .attr('d', 'M 0,-5 L 10,0 L 0,5')
                .attr('fill', '#00d4ff')
                .attr('opacity', 0.6);
            
            zoom = d3.zoom()
                .scaleExtent([0.3, 3])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });
            
            svg.call(zoom);
            
            g = svg.append('g');
            
            renderDependencyGraph();
            renderLegend();
            setupEventListeners();
        }
        
        function renderDependencyGraph() {
            g.selectAll('*').remove();
            
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(120))
                .force('charge', d3.forceManyBody().strength(-400))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(50));
            
            linkElements = g.append('g')
                .selectAll('line')
                .data(links)
                .enter()
                .append('line')
                .attr('class', 'link')
                .attr('stroke', '#00d4ff')
                .attr('stroke-width', 1.5)
                .attr('marker-end', 'url(#arrowhead)');
            
            nodeElements = g.append('g')
                .selectAll('g')
                .data(nodes)
                .enter()
                .append('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragStarted)
                    .on('drag', dragged)
                    .on('end', dragEnded));
            
            nodeElements.append('rect')
                .attr('width', 120)
                .attr('height', 40)
                .attr('x', -60)
                .attr('y', -20)
                .attr('fill', d => `url(#gradient-${d.module})`)
                .attr('stroke', d => moduleColors[d.module])
                .on('mouseover', showTooltip)
                .on('mouseout', hideTooltip)
                .on('click', showFileInfo);
            
            nodeElements.append('text')
                .attr('text-anchor', 'middle')
                .attr('dy', 5)
                .text(d => d.name.length > 15 ? d.name.substring(0, 12) + '...' : d.name);
            
            simulation.on('tick', () => {
                linkElements
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }
        
        function renderHierarchyGraph() {
            g.selectAll('*').remove();
            
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const hierarchyData = {
                name: 'ADC采集系统',
                children: [
                    {
                        name: '核心层',
                        children: [
                            { name: 'adc_types.h', module: 'core' },
                            { name: 'main.c', module: 'core' },
                            { name: 'adc_error.c', module: 'core' }
                        ]
                    },
                    {
                        name: '数据层',
                        children: [
                            { name: 'ring_buffer.h', module: 'buffer' },
                            { name: 'ring_buffer.c', module: 'buffer' }
                        ]
                    },
                    {
                        name: '采集层',
                        children: [
                            { name: 'adc_simulator.h', module: 'adc' },
                            { name: 'adc_simulator.c', module: 'adc' }
                        ]
                    },
                    {
                        name: '线程层',
                        children: [
                            { name: 'thread_manager.h', module: 'thread' },
                            { name: 'thread_manager.c', module: 'thread' },
                            { name: 'thread_workers.c', module: 'thread' }
                        ]
                    },
                    {
                        name: '网络层',
                        children: [
                            { name: 'tcp_client.h', module: 'network' },
                            { name: 'tcp_client.c', module: 'network' }
                        ]
                    },
                    {
                        name: '工具层',
                        children: [
                            { name: 'config.h', module: 'config' },
                            { name: 'config.c', module: 'config' },
                            { name: 'logger.h', module: 'utils' },
                            { name: 'logger.c', module: 'utils' },
                            { name: 'timestamp.h', module: 'utils' },
                            { name: 'timestamp.c', module: 'utils' }
                        ]
                    },
                    {
                        name: '测试层',
                        children: [
                            { name: 'test_ring_buffer.c', module: 'test' },
                            { name: 'test_adc_simulator.c', module: 'test' },
                            { name: 'test_performance.c', module: 'test' },
                            { name: 'test_server.c', module: 'test' }
                        ]
                    }
                ]
            };
            
            const root = d3.hierarchy(hierarchyData);
            
            // 计算树的最大深度和叶子节点数
            const maxDepth = root.height;
            const leafCount = root.leaves().length;
            
            // 使用更大的间距避免重叠
            const nodeWidth = 150;
            const nodeHeight = 50;
            const levelWidth = 250;
            
            // 设置树布局
            const treeLayout = d3.tree()
                .nodeSize([nodeHeight + 10, nodeWidth + 50])
                .separation((a, b) => {
                    return a.parent === b.parent ? 1.2 : 1.5;
                });
            
            treeLayout(root);
            
            // 计算边界并居中
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            root.descendants().forEach(d => {
                minX = Math.min(minX, d.x);
                maxX = Math.max(maxX, d.x);
                minY = Math.min(minY, d.y);
                maxY = Math.max(maxY, d.y);
            });
            
            const treeWidth = maxY - minY + nodeWidth;
            const treeHeight = maxX - minX + nodeHeight;
            
            // 计算居中偏移
            const offsetX = (width - treeWidth) / 2 - minY + 50;
            const offsetY = (height - treeHeight) / 2 - minX + 50;
            
            // 绘制连接线
            g.selectAll('.link-h')
                .data(root.links())
                .enter()
                .append('path')
                .attr('class', 'link')
                .attr('fill', 'none')
                .attr('stroke', '#00d4ff')
                .attr('stroke-width', 1.5)
                .attr('d', d => {
                    const sx = d.source.y + offsetX;
                    const sy = d.source.x + offsetY;
                    const tx = d.target.y + offsetX;
                    const ty = d.target.x + offsetY;
                    return `M ${sx} ${sy} C ${(sx + tx) / 2} ${sy}, ${(sx + tx) / 2} ${ty}, ${tx} ${ty}`;
                });
            
            // 绘制节点
            const nodeGs = g.selectAll('.node-h')
                .data(root.descendants())
                .enter()
                .append('g')
                .attr('class', 'node')
                .attr('transform', d => `translate(${d.y + offsetX},${d.x + offsetY})`);
            
            nodeGs.append('rect')
                .attr('width', d => d.children ? 110 : 140)
                .attr('height', 40)
                .attr('x', d => d.children ? -55 : -70)
                .attr('y', -20)
                .attr('rx', 8)
                .attr('fill', d => d.children ? 'rgba(0, 212, 255, 0.3)' : `url(#gradient-${d.data.module || 'core'})`)
                .attr('stroke', d => d.children ? '#00d4ff' : moduleColors[d.data.module || 'core'])
                .attr('stroke-width', 2);
            
            nodeGs.append('text')
                .attr('text-anchor', 'middle')
                .attr('dy', 5)
                .attr('font-size', d => d.children ? '13px' : '11px')
                .attr('font-weight', d => d.children ? 'bold' : 'normal')
                .text(d => d.data.name);
            
            // 添加标题
            g.append('text')
                .attr('x', width / 2)
                .attr('y', 40)
                .attr('text-anchor', 'middle')
                .attr('fill', '#00d4ff')
                .attr('font-size', '18px')
                .attr('font-weight', 'bold')
                .text('系统模块层级结构');
        }
        
        function renderFlowGraph() {
            g.selectAll('*').remove();
            
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const flowData = [
                { id: 'adc', name: 'ADC采集线程', x: 150, y: height/2, module: 'adc' },
                { id: 'buffer1', name: '采集缓冲区', x: 350, y: height/2, module: 'buffer' },
                { id: 'process', name: '处理线程', x: 550, y: height/2, module: 'thread' },
                { id: 'buffer2', name: '发送缓冲区', x: 750, y: height/2, module: 'buffer' },
                { id: 'network', name: '网络发送线程', x: 950, y: height/2, module: 'network' },
                { id: 'tcp', name: 'TCP客户端', x: 1150, y: height/2, module: 'network' }
            ];
            
            const flowLinks = [
                { source: 'adc', target: 'buffer1', label: '40kHz' },
                { source: 'buffer1', target: 'process', label: '批量读取' },
                { source: 'process', target: 'buffer2', label: '处理后数据' },
                { source: 'buffer2', target: 'network', label: '批量读取' },
                { source: 'network', target: 'tcp', label: 'TCP发送' }
            ];
            
            g.selectAll('.flow-link')
                .data(flowLinks)
                .enter()
                .append('path')
                .attr('class', 'link')
                .attr('fill', 'none')
                .attr('stroke', '#00d4ff')
                .attr('stroke-width', 3)
                .attr('marker-end', 'url(#arrowhead)')
                .attr('d', d => {
                    const source = flowData.find(n => n.id === d.source);
                    const target = flowData.find(n => n.id === d.target);
                    return `M ${source.x + 70} ${source.y} L ${target.x - 70} ${target.y}`;
                });
            
            g.selectAll('.flow-label')
                .data(flowLinks)
                .enter()
                .append('text')
                .attr('x', d => {
                    const source = flowData.find(n => n.id === d.source);
                    const target = flowData.find(n => n.id === d.target);
                    return (source.x + target.x) / 2;
                })
                .attr('y', d => {
                    const source = flowData.find(n => n.id === d.source);
                    return source.y - 30;
                })
                .attr('text-anchor', 'middle')
                .attr('fill', '#888')
                .attr('font-size', '12px')
                .text(d => d.label);
            
            g.selectAll('.flow-node')
                .data(flowData)
                .enter()
                .append('g')
                .attr('class', 'node')
                .attr('transform', d => `translate(${d.x},${d.y})`)
                .each(function(d) {
                    const node = d3.select(this);
                    node.append('rect')
                        .attr('width', 140)
                        .attr('height', 50)
                        .attr('x', -70)
                        .attr('y', -25)
                        .attr('rx', 10)
                        .attr('fill', `url(#gradient-${d.module})`)
                        .attr('stroke', moduleColors[d.module])
                        .attr('stroke-width', 2);
                    
                    node.append('text')
                        .attr('text-anchor', 'middle')
                        .attr('dy', 5)
                        .attr('font-size', '12px')
                        .text(d.name);
                });
            
            g.append('text')
                .attr('x', width / 2)
                .attr('y', 50)
                .attr('text-anchor', 'middle')
                .attr('fill', '#00d4ff')
                .attr('font-size', '18px')
                .text('三级流水线数据流');
            
            g.append('text')
                .attr('x', width / 2)
                .attr('y', height - 50)
                .attr('text-anchor', 'middle')
                .attr('fill', '#888')
                .attr('font-size', '14px')
                .text('采集 → 处理 → 发送 | 采样率: 40kHz | 延迟: < 1ms');
        }
        
        function renderLegend() {
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            
            Object.entries(moduleColors).forEach(([name, color]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${color}"></div>
                    <span class="legend-text">${moduleDescriptions[name] || name}</span>
                `;
                item.addEventListener('click', () => highlightModule(name));
                legend.appendChild(item);
            });
        }
        
        function highlightModule(moduleName) {
            nodeElements.selectAll('rect')
                .attr('stroke-width', d => d.module === moduleName ? 4 : 2)
                .attr('filter', d => d.module === moduleName ? 'brightness(1.5)' : 'none');
        }
        
        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `
                <h4>${d.name}</h4>
                <p><strong>模块:</strong> ${d.module}</p>
                <p><strong>类型:</strong> ${d.type}</p>
                <p><strong>描述:</strong> ${d.desc}</p>
                <p><strong>代码行数:</strong> ${d.lines}</p>
                ${d.dependencies.length > 0 ? `
                    <div class="dependency-list">
                        <strong>依赖:</strong>
                        ${d.dependencies.map(dep => `<span class="dependency-item">${dep}</span>`).join('')}
                    </div>
                ` : ''}
                ${d.exports.length > 0 ? `
                    <div class="dependency-list">
                        <strong>导出:</strong>
                        ${d.exports.map(exp => `<span class="dependency-item">${exp}</span>`).join('')}
                    </div>
                ` : ''}
            `;
            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
            tooltip.classList.add('visible');
        }
        
        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }
        
        function showFileInfo(event, d) {
            const fileInfo = document.getElementById('file-info');
            const content = document.getElementById('file-info-content');
            
            fileInfo.style.display = 'block';
            content.innerHTML = `
                <p><strong>文件名:</strong> ${d.name}</p>
                <p><strong>模块:</strong> ${d.module}</p>
                <p><strong>类型:</strong> ${d.type}</p>
                <p><strong>描述:</strong> ${d.desc}</p>
                <p><strong>代码行数:</strong> ~${d.lines} 行</p>
                ${d.dependencies.length > 0 ? `<p><strong>依赖文件:</strong> ${d.dependencies.join(', ')}</p>` : ''}
                ${d.exports.length > 0 ? `<p><strong>导出符号:</strong> ${d.exports.join(', ')}</p>` : ''}
            `;
        }
        
        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        function setupEventListeners() {
            document.querySelectorAll('.control-btn[data-view]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.control-btn[data-view]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const view = btn.dataset.view;
                    currentView = view;
                    
                    if (view === 'dependency') renderDependencyGraph();
                    else if (view === 'hierarchy') renderHierarchyGraph();
                    else if (view === 'flow') renderFlowGraph();
                });
            });
            
            document.getElementById('reset-btn').addEventListener('click', () => {
                const container = document.getElementById('graph-container');
                svg.transition().duration(500).call(
                    zoom.transform,
                    d3.zoomIdentity.translate(0, 0).scale(1)
                );
                if (currentView === 'dependency') {
                    renderDependencyGraph();
                }
            });
            
            document.getElementById('zoom-in-btn').addEventListener('click', () => {
                svg.transition().duration(300).call(zoom.scaleBy, 1.3);
            });
            
            document.getElementById('zoom-out-btn').addEventListener('click', () => {
                svg.transition().duration(300).call(zoom.scaleBy, 0.7);
            });
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                nodeElements.selectAll('rect')
                    .attr('stroke-width', d => {
                        if (!query) return 2;
                        return d.name.toLowerCase().includes(query) || 
                               d.module.toLowerCase().includes(query) ? 4 : 2;
                    })
                    .attr('filter', d => {
                        if (!query) return 'none';
                        return d.name.toLowerCase().includes(query) || 
                               d.module.toLowerCase().includes(query) ? 'brightness(1.5)' : 'none';
                    });
            });
        }
        
        window.addEventListener('load', initVisualization);
        window.addEventListener('resize', () => {
            if (currentView === 'dependency') renderDependencyGraph();
            else if (currentView === 'hierarchy') renderHierarchyGraph();
            else if (currentView === 'flow') renderFlowGraph();
        });
    </script>
</body>
</html>
